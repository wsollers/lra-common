name: Common sync disabled

on:
  workflow_dispatch:

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Explain disabled sync
        run: |
          echo "Common fan-out sync is disabled."
          echo "Volume and monorepo builds must obtain lra-common directly, normally through the build Docker image or an explicit checkout."
